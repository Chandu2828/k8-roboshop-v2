apiVersion: v1
kind: Service 
metadata:
  name: mongodb-headless 
  namespace: roboshop 
  labels:
    project: roboshop 
    component: mongodb 
    tier: db 
spec:
  ports:
  - protocol: TCP 
    port: 27017 # service port 
    targetPort: 27017 # container port 
  clusterIP: None # headless service 
  selector:
    project: roboshop 
    component: mongodb 
    tier: db 
---
apiVersion: v1 
kind: Service 
metadata:
  name: mongodb 
  namespace: roboshop 
  labels:
    project: roboshop 
    component: mongodb 
    tier: db 
spec:
  ports: 
  - protocol: TCP 
    port: 27017 
    targetPort: 27017 
  selector:
    project: roboshop 
    component: mongodb 
    tier: db 
---
apiVersion: apps/v1 
kind: StatefulSet 
metadata:
  name: mongodb 
  namespace: roboshop 
  labels:
    project: roboshop 
    component: mongodb 
    tier: db 
spec:
  serviceName: "mongodb-headless"
  replicas: 1 
  template:
    metadata:
      labels:
        project: roboshop 
        component: mongodb 
        tier: db 
    spec:
      containers:
      - name: mongodb 
        image: chandu2828/mongodb:v1
        volumeMounts:
        - name: mongodb 
          mountPath: /data/db 
  selector: 
    matchLabels:
      project: roboshop 
      component: mongodb 
      tier: db 
  volumeClaimTemplates:
  - metadata:
      name: mongodb 
    spec: 
      accessModes: ["ReadWriteOnce"]
      storageClassName: roboshop-ebs 
      resources:
        requests:
          storage: 1Gi 